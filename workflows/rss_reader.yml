name: Auto Update RSS Reader

on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小時自動執行一次
  workflow_dispatch: # 允許你手動點擊按鈕更新

jobs:
  update-rss:
    runs-on: ubuntu-latest
    steps:
    - name: 簽出原始碼
      uses: actions/checkout@v3

    - name: 設定 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: 安裝套件
      run: |
        pip install -r requirements.txt

    - name: 執行 RSS 抓取腳本
      run: python update_rss.py

    - name: 將更新後的 HTML 推回儲存庫
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add MeetingNotice.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update RSS content" && git push)
